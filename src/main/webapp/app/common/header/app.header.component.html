<header class="sticky top-0 z-50 w-full bg-white/80 backdrop-blur-md shadow-sm dark:bg-gray-900/80 dark:border-b dark:border-gray-800 transition-all duration-300">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">

        <div class="flex items-center gap-4 lg:gap-10">
            <a routerLink="/home" class="flex items-center group">
                <div class="bg-green-600 text-white p-2 rounded-lg mr-2 shadow-sm group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <span class="font-bold text-lg md:text-xl tracking-tight text-gray-900 dark:text-white truncate max-w-[150px] md:max-w-none">
                    {{ appTitle }}
                </span>
            </a>

            <nav class="hidden lg:flex items-center space-x-8 text-[13px] font-bold text-gray-600 dark:text-gray-300">
                <a routerLink="/courses-list" class="hover:text-green-600 dark:hover:text-green-400 transition-colors uppercase">Kurslar</a>
                <a *ngIf="isLoggedIn && userRole === 'ROLE_USER'" routerLink="/courses/view/me" class="hover:text-green-600 dark:hover:text-green-400 transition-colors uppercase">Mening kurslarim</a>
                <a routerLink="/tests" class="hover:text-green-600 dark:hover:text-green-400 transition-colors uppercase">Online Test</a>
                <a routerLink="/blog" class="hover:text-green-600 dark:hover:text-green-400 transition-colors uppercase">Blog</a>
            </nav>
        </div>

        <div class="flex items-center space-x-2 md:space-x-5">
            <app-theme-switch></app-theme-switch>

            <div *ngIf="isLoggedIn" class="relative">
                <button (click)="toggleProfile()" class="flex items-center focus:outline-none">
                    <div *ngIf="authService.currentUser()?.imagePath==null" class="w-9 h-9 md:w-10 md:h-10 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center border-2 border-transparent hover:border-green-500 transition-all">
                        <span class="text-gray-500 dark:text-gray-400 text-sm md:text-base font-bold">{{ authService.currentUser()?.firstName?.charAt(0) }}</span>
                    </div>
                </button>

                <div *ngIf="isProfileOpen" class="absolute right-0 mt-3 w-52 bg-white border border-gray-100 rounded-xl shadow-xl py-2 z-50 dark:bg-gray-800 dark:border-gray-700">
                    <a routerLink="/profile" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 dark:text-gray-200 dark:hover:bg-gray-700/50">
                        <i class="fa-solid fa-user mr-3"></i> Profil
                    </a>
                    <button (click)="logout()" class="flex items-center w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20">
                        <i class="fa-solid fa-right-from-bracket mr-3"></i> Chiqish
                    </button>
                </div>
            </div>

            <button *ngIf="!isLoggedIn" routerLink="/auth/login" class="hidden sm:flex items-center gap-2 bg-green-600 text-white px-5 py-2 rounded-xl font-bold text-xs hover:bg-green-700 transition-all shadow-md active:scale-95">
                KIRISH
            </button>

            <button class="lg:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800 transition-colors" (click)="toggleMobileMenu()">
                <i class="fa-solid" [ngClass]="isMenuOpen ? 'fa-xmark' : 'fa-bars-staggered'"></i>
            </button>
        </div>
    </div>

    <div *ngIf="isMenuOpen" class="lg:hidden absolute top-full left-0 w-full bg-white border-b border-gray-100 shadow-xl dark:bg-gray-900 dark:border-gray-800 z-40 animate-in slide-in-from-top duration-300">
        <nav class="flex flex-col p-4 space-y-1">
            <a routerLink="/courses-list" (click)="isMenuOpen = false" class="flex items-center p-3 rounded-lg hover:bg-green-50 dark:hover:bg-green-900/20 text-gray-700 dark:text-gray-200 font-medium">
                <i class="fa-solid fa-book-open mr-3 w-5"></i> Kurslar
            </a>
            <a routerLink="/tests" (click)="isMenuOpen = false" class="flex items-center p-3 rounded-lg hover:bg-green-50 dark:hover:bg-green-900/20 text-gray-700 dark:text-gray-200 font-medium">
                <i class="fa-solid fa-vial mr-3 w-5"></i> Online Testlar
            </a>
            <a routerLink="/tests" (click)="isMenuOpen = false" class="flex items-center p-3 rounded-lg hover:bg-green-50 dark:hover:bg-green-900/20 text-gray-700 dark:text-gray-200 font-medium">
                <i class="fa-solid fa-vial mr-3 w-5"></i> Blog
            </a>
            <hr class="my-2 dark:border-gray-800">
            <button *ngIf="!isLoggedIn" routerLink="/auth/login" class="w-full bg-green-600 text-white p-3 rounded-xl font-bold">KIRISH</button>
        </nav>
    </div>
</header>
