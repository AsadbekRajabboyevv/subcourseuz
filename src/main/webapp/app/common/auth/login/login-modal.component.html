<div *ngIf="isOpen"
     class="fixed inset-0 flex justify-center items-center bg-opacity-50 backdrop-blur-sm z-50">

    <div class="bg-white p-6 rounded-lg shadow-lg w-96 relative">

        <button (click)="close()"
                class="absolute top-4 right-4 text-gray-700 hover:bg-gray-300 p-2 rounded-full">
            ✕
        </button>

        <h2 class="text-xl font-bold text-gray-700 mb-4">Tizimga kirish</h2>

        <form (ngSubmit)="login()">
            <div class="mb-3">
                <label class="block text-sm">Email</label>
                <input [(ngModel)]="email" name="email"
                       class="w-full px-3 py-2 border rounded" required>
            </div>

            <div class="mb-3">
                <label class="block text-sm">Parol</label>
                <input type="password"
                       [(ngModel)]="password"
                       name="password"
                       class="w-full px-3 py-2 border rounded" required>
            </div>

            <div *ngIf="error"
                 class="bg-red-500 text-white p-2 rounded mb-4 text-sm">
                Email yoki parol noto‘g‘ri!
            </div>

            <button class="w-full bg-blue-500 text-white py-2 rounded">
                Kirish
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="text-sm">
                Akkountingiz yo'qmi?
                <a (click)="switchToRegister()" class="text-blue-500 cursor-pointer">
                    Ro'yxatdan o'tish
                </a>
            </p>
        </div>

    </div>
</div>
