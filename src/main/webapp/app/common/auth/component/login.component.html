<div content class="flex min-h-[85vh] items-center justify-center p-4">
      <div class="w-full max-w-md rounded-[2.5rem] border border-gray-100 bg-white p-8 shadow-2xl transition-all hover:border-green-500 dark:border-gray-800 dark:bg-gray-900 md:p-12">
           <div class="mb-10 text-center">
               <h2 class="text-3xl font-black tracking-tighter text-gray-900 dark:text-white uppercase">Tizimga kirish</h2>
               <p class="mt-2 text-[10px] font-bold uppercase tracking-widest text-gray-400">Subcourse platformasiga xush kelibsiz</p>
           </div>

           <form (submit)="onLogin()" class="space-y-6">
               <app-input type="text" label="Email Manzil" placeholder="example@mail.com" [(ngModel)]="loginData.email" name="email"></app-input>
               <app-input type="text" label="Parol" placeholder="••••••••" [(ngModel)]="loginData.password" name="password"></app-input>
               <button type="submit" class="mt-5 w-full rounded-2xl bg-gray-900 py-5 text-xs font-black uppercase tracking-[0.2em] text-white shadow-xl active:scale-95 dark:bg-white dark:text-gray-900 hover:border-green-500">
                   Kirish
               </button>
           </form>

           <div class="mt-8 text-center">
               <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">
                   Akkauntingiz yo'qmi?
                   <a [routerLink]="['/auth/register']" [queryParams]="{ returnUrl: route.snapshot.queryParams['returnUrl']}"  class="ml-1 text-green-600 hover:underline">Ro'yxatdan o'ting</a>
               </p>
           </div>
      </div>
</div>
