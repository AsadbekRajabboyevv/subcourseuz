<div content class="flex min-h-[85vh] items-center justify-center p-4">
    <div class="w-full max-w-md rounded-[2.5rem] border border-gray-100 bg-white p-8 shadow-2xl transition-all hover:border-green-500 dark:border-gray-800 dark:bg-gray-900 md:p-12">
        <div class="mb-10 text-center">
            <h2 class="text-3xl font-black tracking-tighter text-gray-900 dark:text-white uppercase">
                {{ 'auth.login_title' | translate }}
            </h2>
            <p class="mt-2 text-[10px] font-bold uppercase tracking-widest text-gray-400">
                {{ 'auth.welcome_msg' | translate }}
            </p>
        </div>

        <form (submit)="onLogin()" class="space-y-6">
            <app-input type="text"
                       [label]="'auth.email_label' | translate"
                       [placeholder]="'auth.email_placeholder' | translate"
                       [(ngModel)]="loginData.email"
                       name="email">
            </app-input>

            <app-input type="text"
                       [label]="'auth.password_label' | translate"
                       [placeholder]="'auth.password_placeholder' | translate"
                       [(ngModel)]="loginData.password"
                       name="password">
            </app-input>

            <button type="submit" class="mt-5 w-full rounded-2xl bg-gray-900 py-5 text-xs font-black uppercase tracking-[0.2em] text-white shadow-xl active:scale-95 dark:bg-white dark:text-gray-900 hover:border-green-500">
                {{ 'auth.login_btn' | translate }}
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">
                {{ 'auth.no_account' | translate }}
                <a [routerLink]="['/auth/register']"
                   [queryParams]="{ returnUrl: route.snapshot.queryParams['returnUrl']}"
                   class="ml-1 text-green-600 hover:underline">
                    {{ 'auth.register_link' | translate }}
                </a>
            </p>
        </div>
    </div>
</div>
