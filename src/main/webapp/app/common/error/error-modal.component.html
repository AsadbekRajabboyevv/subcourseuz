@if (errorService.errorData(); as error) {
    <div class="fixed inset-0 z-[200] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md animate-in fade-in duration-300"></div>

        <div class="relative w-full max-w-sm overflow-hidden rounded-[2.5rem] bg-white p-8 shadow-2xl dark:bg-gray-900 animate-in zoom-in duration-300">

            <div class="text-center">
                <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-red-50 text-red-500 dark:bg-red-500/10">
                    <i class="fa-solid fa-triangle-exclamation text-3xl"></i>
                </div>

                <h3 class="mb-2 text-xl font-black uppercase tracking-tight text-gray-900 dark:text-white">
                    {{ error.title }}
                </h3>
                <p class="mb-8 text-sm font-medium text-gray-500 dark:text-gray-400">
                    {{ error.message }}
                </p>

                <button (click)="errorService.close()"
                        class="w-full rounded-2xl bg-gray-900 py-4 text-[10px] font-black uppercase tracking-widest text-white transition-all hover:bg-red-600 active:scale-95 dark:bg-white dark:text-gray-900 dark:hover:bg-red-500 dark:hover:text-white">
                    Tushunarli
                </button>
            </div>

            @if (error.code) {
                <div class="absolute bottom-0 left-0 right-0 bg-gray-50 py-1 text-center dark:bg-gray-800/50">
                    <span class="text-[8px] font-bold uppercase text-gray-400">Error Code: {{ error.code }}</span>
                </div>
            }
        </div>
    </div>
}
