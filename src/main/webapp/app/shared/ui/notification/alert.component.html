<div [ngClass]="containerClasses">
  <div class="flex-1">
    <ng-content></ng-content>
    @if (message) {
      <span>{{ message }}</span>
    }
  </div>
  @if (dismissible) {
    <button
      type="button"
      class="ml-2 inline-flex h-6 w-6 items-center justify-center rounded-full text-xs text-gray-400 hover:bg-gray-100 hover:text-gray-700 dark:hover:bg-gray-800"
      (click)="close()"
    >
      ✕
    </button>
  }
</div>
