<div [ngClass]="containerClasses" role="alert">
    <div class="flex-shrink-0 flex items-center justify-center w-10 h-10 rounded-xl bg-white/50 dark:bg-black/20 shadow-sm text-inherit">
        <ng-icon [name]="iconName()" size="22"></ng-icon>
    </div>

    <div class="flex-1 leading-tight">
        <p class="font-bold opacity-90 capitalize">{{ type }}</p>
        <div class="text-[13px] opacity-80">
            <ng-content></ng-content>
            @if (message) { <span>{{ message }}</span> }
        </div>
    </div>

    @if (dismissible) {
        <button
            type="button"
            class="ml-2 p-1.5 rounded-lg hover:bg-black/5 dark:hover:bg-white/10 transition-colors"
            (click)="close()"
        >
            <ng-icon name="heroXMark" size="16"></ng-icon>
        </button>
    }
</div>
