<div class="rounded-lg border border-red-100 bg-red-50 px-4 py-3 text-sm text-red-800 dark:border-red-900 dark:bg-red-950 dark:text-red-200">
  <div class="mb-2 font-semibold" i18n="@@error_message_title">
    Xatolik
  </div>
  <div class="mb-3">
    {{ message }}
  </div>
  <button
    type="button"
    class="inline-flex items-center rounded-md border border-red-500 px-3 py-1.5 text-xs font-medium text-red-600 hover:bg-red-50 dark:text-red-300 dark:border-red-400 dark:hover:bg-red-900"

  >
    {{ retryLabel }}
  </button>
</div>
