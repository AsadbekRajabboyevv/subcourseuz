<div class="flex min-h-screen bg-gray-50 dark:bg-gray-900">
  <!-- Sidebar -->
  <aside
    class="fixed inset-y-0 left-0 z-40 w-64 transform bg-white shadow-sm transition-transform duration-200 ease-in-out dark:bg-gray-900 md:relative md:translate-x-0"
    [class.-translate-x-full]="collapsed()"
    [class.translate-x-0]="!collapsed()"
    [ngClass]="desktopSidebarWidthClass"
  >
    <div class="flex h-full flex-col border-r border-gray-200 dark:border-gray-800">
      <div class="flex items-center justify-between px-4 py-3 md:hidden">
        <span class="text-sm font-semibold text-gray-700 dark:text-gray-100">Menyu</span>
        @if (collapsible) {
          <button
            type="button"
            class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-gray-300 text-gray-600 hover:bg-gray-100 dark:border-gray-700 dark:text-gray-200 dark:hover:bg-gray-800"
            (click)="toggle()"
          >
            ✕
          </button>
        }
      </div>
      <div class="flex-1 overflow-y-auto px-4 py-4">
        <ng-content select="[sidebar]"></ng-content>
      </div>
    </div>
  </aside>

  <!-- Backdrop for mobile -->
  @if (collapsible && !collapsed()) {
    <div
      class="fixed inset-0 z-30 bg-black/40 md:hidden"
      (click)="toggle()"
    ></div>
  }

  <!-- Main content -->
  <div class="flex-1 md:ml-0">
    <div class="flex items-center justify-between border-b border-gray-200 bg-white px-4 py-3 shadow-sm dark:border-gray-800 dark:bg-gray-900 md:hidden">
      @if (collapsible) {
        <button
          type="button"
          class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-gray-300 text-gray-600 hover:bg-gray-100 dark:border-gray-700 dark:text-gray-200 dark:hover:bg-gray-800"
          (click)="toggle()"
        >
          ☰
        </button>
      }
      <ng-content select="[page-title]"></ng-content>
    </div>

    <main class="w-full px-4 py-4 md:ml-0 md:px-6 lg:px-8">
      <ng-content select="[content]"></ng-content>
    </main>
  </div>
</div>
