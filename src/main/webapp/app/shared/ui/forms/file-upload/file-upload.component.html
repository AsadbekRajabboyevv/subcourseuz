<div class="flex flex-col gap-2">
  <!-- Drop zone -->
  <div
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave()"
    (drop)="onDrop($event)"
    [class.border-green-500]="isDragOver()"
    [class.bg-green-50]="isDragOver()"
    [class.opacity-50]="isDisabled()"
    [class.cursor-not-allowed]="isDisabled()"
    class="flex flex-col items-center justify-center gap-2 rounded-lg border-2 border-dashed border-gray-300
           bg-white px-6 py-8 text-center shadow-sm transition-colors"
  >
    <svg class="h-8 w-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
    </svg>
    <p class="text-sm text-gray-600">
      Faylni bu yerga tashlang yoki
      <label
        [class.pointer-events-none]="isDisabled()"
        class="cursor-pointer font-medium text-green-600 hover:text-green-700"
      >
        tanlang
        <input
          type="file"
          class="sr-only"
          [accept]="accept"
          [multiple]="multiple"
          [disabled]="isDisabled()"
          (change)="onFileSelected($event)"
        />
      </label>
    </p>
    <p class="text-xs text-gray-400">Maksimal hajm: {{ maxSizeMb }}MB</p>
  </div>

  <!-- Rejection error -->
  @if (rejectionMessage()) {
    <p class="text-xs text-red-500">{{ rejectionMessage() }}</p>
  }

  <!-- Selected files list -->
  @if (selectedFiles().length > 0) {
    <ul class="flex flex-col gap-1">
      @for (file of selectedFiles(); track file.name; let i = $index) {
        <li class="flex items-center justify-between rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-sm text-gray-700">
          <span class="truncate">{{ file.name }}</span>
          <button
            type="button"
            (click)="removeFile(i)"
            [disabled]="isDisabled()"
            class="ml-2 shrink-0 text-gray-400 hover:text-red-500 disabled:cursor-not-allowed"
            aria-label="Faylni olib tashlash"
          >
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </li>
      }
    </ul>
  }
</div>
