<div class="flex flex-col gap-1">
  @if (label) {
    <label class="text-sm font-medium text-gray-700">{{ label }}</label>
  }

  @if (searchable) {
    <input
      type="text"
      placeholder="Qidirish..."
      [value]="searchQuery()"
      (input)="onSearch($event)"
      [disabled]="isDisabled()"
      class="mb-1 w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm text-gray-700 shadow-sm
             placeholder:text-gray-400
             focus:border-green-500 focus:outline-none focus:ring-2 focus:ring-green-500/30
             disabled:cursor-not-allowed disabled:bg-gray-50"
    />
  }

  <select
    [multiple]="multiple"
    [disabled]="isDisabled()"
    (change)="onSelectChange($event)"
    (blur)="onBlur()"
    class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm text-gray-700 shadow-sm
           focus:border-green-500 focus:outline-none focus:ring-2 focus:ring-green-500/30
           disabled:cursor-not-allowed disabled:bg-gray-50 disabled:text-gray-400"
    [class.min-h-32]="multiple"
  >
    @if (!multiple) {
      <option value="" disabled [selected]="!value()">Tanlang...</option>
    }
    @for (option of filteredOptions(); track option.value) {
      <option [value]="option.value" [selected]="isSelected(option)">
        {{ option.label }}
      </option>
    }
  </select>
</div>
