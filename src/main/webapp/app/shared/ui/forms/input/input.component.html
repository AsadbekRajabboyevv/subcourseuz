<div class="space-y-2">
    @if (label) {
        <label class="text-[11px] font-bold text-gray-500 dark:text-gray-400 uppercase ml-1 block tracking-wider">
            {{ label }}
        </label>
    }

    <div class="relative group flex items-center">
        @if (icon) {
            <ng-icon [name]="iconMap[icon] || icon" size="18"
                     class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-green-500 transition-colors pointer-events-none"
                     [class.text-red-400]="errorMessage">
            </ng-icon>
        }

        <input
            [type]="getInputType()"
            [placeholder]="placeholder"
            [disabled]="isDisabled() || disabled"
            [value]="value()"
            (input)="onInput($event)"
            (blur)="onBlur()"
            class="w-full py-3.5 bg-gray-50 dark:bg-gray-800 border-2 border-transparent rounded-2xl outline-none dark:text-white transition-all text-sm
             focus:border-green-500 focus:bg-white dark:focus:bg-gray-900 shadow-sm"
            [class.pl-12]="icon"
            [class.pl-5]="!icon"
            [class.pr-12]="type === 'password'"
            [class.border-red-500/50]="errorMessage"
        [class.focus:border-red-500]="errorMessage"
        />

        @if (type === 'password') {
            <button type="button" (click)="showPassword.set(!showPassword())"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-green-500 transition-colors focus:outline-none">
                <ng-icon [name]="showPassword() ? 'heroEyeSlash' : 'heroEye'" size="18"></ng-icon>
            </button>
        }
    </div>

    @if (errorMessage) {
        <div class="flex items-center gap-1.5 text-[11px] font-bold text-red-500 ml-1 animate-in slide-in-from-top-1">
            <ng-icon name="heroExclamationCircle" size="12"></ng-icon>
            {{ errorMessage }}
        </div>
    }
</div>
