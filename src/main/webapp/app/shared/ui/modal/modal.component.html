<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40"
  (click)="onBackdropClick($event)"
>
  <div
    class="mx-4 w-full rounded-lg border border-gray-200 bg-white shadow-lg dark:border-gray-700 dark:bg-gray-900"
    [ngClass]="sizeClasses"
  >
    <div class="flex items-center justify-between border-b border-gray-200 px-4 py-3 dark:border-gray-700">
      <h2 class="text-sm font-semibold text-gray-900 dark:text-gray-100">
        {{ title }}
      </h2>
      @if (closable) {
        <button
          type="button"
          class="inline-flex h-8 w-8 items-center justify-center rounded-md text-gray-500 hover:bg-gray-100 hover:text-gray-700 dark:text-gray-300 dark:hover:bg-gray-800 dark:hover:text-gray-100"
          (click)="close()"
        >
          ✕
        </button>
      }
    </div>

    <div class="px-4 py-3">
      <ng-content></ng-content>
    </div>
  </div>
</div>
