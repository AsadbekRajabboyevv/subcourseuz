<app-modal
  [title]="config.title"
  size="sm"
  (closed)="onClose()"
>
  <div class="space-y-4">
    <p class="text-sm text-gray-700 dark:text-gray-200">
      {{ config.message }}
    </p>
    <div class="flex justify-end gap-3">
      <button
        type="button"
        class="rounded-md border border-gray-300 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 dark:border-gray-600 dark:text-gray-200 dark:hover:bg-gray-800"
        (click)="onClose()"
      >
        {{ config.cancelLabel ?? 'Bekor qilish' }}
      </button>
      <button
        type="button"
        class="rounded-md bg-green-500 px-4 py-2 text-sm font-semibold text-white hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900"
        (click)="onConfirm()"
      >
        {{ config.confirmLabel ?? 'Tasdiqlash' }}
      </button>
    </div>
  </div>
</app-modal>
