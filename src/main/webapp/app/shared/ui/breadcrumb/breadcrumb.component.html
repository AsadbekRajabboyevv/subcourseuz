<nav class="flex items-center space-x-2 text-[11px] font-medium text-gray-500 dark:text-gray-400">
    @for (bc of breadcrumbs(); track bc.url; let last = $last; let first = $first) {
        <div class="flex items-center">
            @if (!last) {
                <a [routerLink]="bc.url"
                   class="flex items-center gap-1.5 transition-colors hover:text-green-600 dark:hover:text-green-400">
                    @if (first) {
                        <ng-icon name="heroHome" size="13" [strokeWidth]="2"></ng-icon>
                    }
                    {{ bc.label }}
                </a>
                <ng-icon name="heroChevronRight" size="14"
                         class="mx-1 text-gray-300 dark:text-gray-600"></ng-icon>
            } @else {
                <span class="flex items-center gap-1.5 text-gray-900 dark:text-white font-semibold">
                    @if (first) {
                        <ng-icon name="heroHome" size="13" [strokeWidth]="2.5"></ng-icon>
                    }
                    {{ bc.label }}
                </span>
            }
        </div>
    }
</nav>
