<div class="rounded-lg border border-red-100 bg-red-50 px-4 py-4 text-sm text-red-800 shadow-sm dark:border-red-900 dark:bg-red-950 dark:text-red-200">
  <div class="mb-1 text-sm font-semibold">
    {{ title }}
  </div>
  <div class="mb-3 text-xs">
    {{ message }}
  </div>
  <button type="button" class="inline-flex items-center rounded-md border border-red-500 px-3 py-1.5 text-xs font-medium text-red-600 hover:bg-red-50 dark:border-red-400 dark:text-red-300 dark:hover:bg-red-900" (click)="onRetry()">
    {{ retryLabel }}
  </button>
</div>
