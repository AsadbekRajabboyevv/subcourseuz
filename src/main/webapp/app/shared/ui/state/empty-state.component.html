<div class="flex flex-col items-center justify-center gap-2 rounded-lg border border-dashed border-gray-200 bg-white px-4 py-6 text-center text-sm text-gray-600 shadow-sm dark:border-gray-700 dark:bg-gray-900 dark:text-gray-300">
    @if (icon) {
        <div class="mb-1 text-3xl">
            {{ icon }}
        </div>
    }

    <div class="font-semibold text-gray-800 dark:text-gray-100">
        {{ title }}
    </div>
    <div class="max-w-md text-xs text-gray-500 dark:text-gray-400">
        {{ description }}
    </div>
    @if (actionLabel) {
        <button type="button" class="mt-2 inline-flex items-center rounded-md bg-green-500 px-3 py-1.5 text-xs font-semibold text-white hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900" (click)="onAction()">
            {{ actionLabel }}
        </button>
    }
</div>
