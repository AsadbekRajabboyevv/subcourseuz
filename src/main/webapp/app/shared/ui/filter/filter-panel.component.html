<div class="flex flex-wrap items-end gap-3 rounded-lg border border-gray-200 bg-white p-3 shadow-sm dark:border-gray-800 dark:bg-gray-900">
    <div class="w-full sm:w-64">
        <label
            class="mb-1 block text-xs font-medium text-gray-600 dark:text-gray-300"
            i18n="@@filter_search_label"
        >
            Qidiruv
        </label>

        <app-search-input
            (searchChange)="onSearchChange($event)"
        />
    </div>

    @for (field of config; track field.key) {
        <div class="w-full sm:w-56">
            <label class="mb-1 block text-xs font-medium text-gray-600 dark:text-gray-300">
                {{ field.label }}
            </label>

            @if (field.type === 'text') {
                <input
                    #textInput
                    type="text"
                    class="block w-full rounded-lg border border-gray-300 bg-white px-3 py-1.5 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent dark:border-gray-700 dark:bg-gray-900 dark:text-gray-100"
                    (input)="onFieldChange(field.key, textInput.value)"
                />
            }

            @else if (field.type === 'select') {
                <app-select
                    [options]="field.options ?? []"
                    (ngModelChange)="onFieldChange(field.key, $event)"
                ></app-select>
            }

            @else if (field.type === 'checkbox') {
                <label class="inline-flex items-center gap-2 text-sm text-gray-700 dark:text-gray-200">
                    <input
                        #checkboxInput
                        type="checkbox"
                        class="h-4 w-4 rounded border-gray-300 text-green-500 focus:ring-green-500"
                        (change)="onFieldChange(field.key, checkboxInput.checked)"
                    />
                    {{ field.label }}
                </label>
            }

            @else if (field.type === 'date-range') {
                <div class="flex items-center gap-2">
                    <app-datepicker
                        (ngModelChange)="onDateRangeChange(field.key, 'from', $event)"
                    ></app-datepicker>

                    <span class="text-xs text-gray-400 dark:text-gray-500">—</span>

                    <app-datepicker
                        (ngModelChange)="onDateRangeChange(field.key, 'to', $event)"
                    ></app-datepicker>
                </div>
            }
        </div>
    }

    <div class="ml-auto flex items-center gap-2">
        <button
            type="button"
            class="rounded-md border border-gray-300 px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-200 dark:hover:bg-gray-800"
            (click)="reset()"
            i18n="@@filter_reset_button"
        >
            Tozalash
        </button>
    </div>
</div>
