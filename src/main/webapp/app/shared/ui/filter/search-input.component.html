<div class="relative">
  <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
    🔍
  </span>
  <input
    type="text"
    class="block w-full rounded-lg border border-gray-300 bg-white py-2 pl-8 pr-3 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent dark:border-gray-700 dark:bg-gray-900 dark:text-gray-100"
    [placeholder]="placeholder"
    [value]="value"
    (input)="onInput($any($event.target).value)"
  />
</div>
