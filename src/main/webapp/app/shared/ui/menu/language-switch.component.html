<div class="relative inline-block text-left">
  <div>
    <button 
      type="button" 
      class="inline-flex items-center justify-center w-full rounded-md border border-gray-300 dark:border-gray-600 shadow-sm px-4 py-2 bg-white dark:bg-gray-800 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-100 dark:focus:ring-offset-gray-900 focus:ring-indigo-500"
      (click)="isDropdownOpen = !isDropdownOpen"
      aria-expanded="true"
      aria-haspopup="true">
      {{ getCurrentLanguageName() }}
      <svg class="-mr-1 ml-2 h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
      </svg>
    </button>
  </div>

  @if (isDropdownOpen) {
    <div 
      class="origin-top-right absolute right-0 mt-2 w-48 rounded-md shadow-lg bg-white dark:bg-gray-800 ring-1 ring-black ring-opacity-5 dark:ring-gray-700 z-50"
      [attr.aria-hidden]="!isDropdownOpen"
      role="menu"
      (click)="isDropdownOpen = false">
      <div class="py-1" role="none">
        @for (lang of languages; track lang.code) {
          <button
            type="button"
            class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center gap-2"
            [class.bg-gray-100]="lang.code === currentLanguage"
            [class.dark:bg-gray-700]="lang.code === currentLanguage"
            (click)="changeLanguage(lang.code)"
            role="menuitem">
            <span>{{ lang.flag }}</span>
            <span>{{ lang.name }}</span>
            @if (lang.code === currentLanguage) {
              <svg class="ml-auto h-4 w-4 text-indigo-600" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
              </svg>
            }
          </button>
        }
      </div>
    </div>
  }
</div>
