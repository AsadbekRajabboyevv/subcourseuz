<div class="relative inline-block text-left">
    <button (click)="showDropdown = !showDropdown"
            class="flex items-center gap-2 px-3 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 transition-all border border-gray-300">
        <span>{{ currentLangObj.flag }}</span>
        <span class="font-medium text-sm text-gray-700 uppercase">{{ currentLangObj.code }}</span>
        <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
    </button>

    <div *ngIf="showDropdown"
         class="absolute right-0 mt-2 w-40 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 z-50">
        <div class="py-1">
            <button *ngFor="let lang of languages"
                    (click)="changeLang(lang.code)"
                    [class.bg-blue-50]="lang.code === currentLang"
                    class="w-full text-left flex items-center gap-3 px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition-colors">
                <span>{{ lang.flag }}</span>
                <span>{{ lang.name }}</span>
            </button>
        </div>
    </div>

    <div *ngIf="showDropdown"
         (click)="showDropdown = false"
         class="fixed inset-0 z-40 bg-transparent">
    </div>
</div>
