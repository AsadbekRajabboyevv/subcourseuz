<button
    (click)="toggle()"
    type="button"
    class="relative  active:scale-95 hover:rotate-12 inline-flex h-9 w-16 items-center rounded-full border-2 border-transparent transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 bg-gray-300 dark:bg-gray-600 px-1"
    role="switch"
    [attr.aria-checked]="isDark()"
>
    <span class="sr-only">Mavzuni o'zgartirish</span>

    <span
        class="pointer-events-none flex h-7 w-7 transform items-center justify-center rounded-full bg-white shadow-lg ring-0 transition duration-300 ease-in-out"
        [class.translate-x-7]="isDark()"
        [class.translate-x-0]="!isDark()"
    >
        <svg
            *ngIf="!isDark()"
            class="h-4 w-4 text-orange-500"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.5"
        >
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>

        <svg
            *ngIf="isDark()"
            class="h-4 w-4 text-blue-500"
            fill="currentColor"
            viewBox="0 0 20 20"
        >
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
        </svg>
    </span>
</button>
