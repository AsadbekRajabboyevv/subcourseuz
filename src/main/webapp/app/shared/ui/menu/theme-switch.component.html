<div class="p-1 space-y-1">
    <div class="flex w-full items-center justify-between rounded-2xl px-4 py-2 text-[10px] font-black uppercase tracking-widest text-gray-600 transition-all dark:text-gray-300">
        <div class="flex items-center gap-3">
            <i class="fa-solid" [class]="isDark() ? 'fa-moon text-blue-400' : 'fa-sun text-orange-400'"></i>
            <span>Tungi rejim</span>
        </div>

        <button
            (click)="toggle()"
            type="button"
            class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-gray-200 dark:bg-emerald-600"
            role="switch"
            [attr.aria-checked]="isDark()">

            <span
                class="pointer-events-none relative inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"
                [class.translate-x-5]="isDark()"
                [class.translate-x-0]="!isDark()">

                <span
                    class="absolute inset-0 flex h-full w-full items-center justify-center transition-opacity"
                    [class.opacity-0]="isDark()"
                    [class.opacity-100]="!isDark()">
                    <svg class="h-3 w-3 text-orange-500" fill="currentColor" viewBox="0 0 12 12">
                        <path d="M6 8a2 2 0 100-4 2 2 0 000 4zM1 6a.5.5 0 01.5-.5h.5a.5.5 0 010 1h-.5A.5.5 0 011 6zM10 6a.5.5 0 01.5-.5h.5a.5.5 0 010 1h-.5A.5.5 0 0110 6zM6 1a.5.5 0 01.5.5v.5a.5.5 0 01-1 0v-.5A.5.5 0 016 1zM6 10a.5.5 0 01.5.5v.5a.5.5 0 01-1 0v-.5a.5.5 0 01.5-.5zM2.464 2.464a.5.5 0 01.707 0l.354.353a.5.5 0 01-.707.708l-.354-.354a.5.5 0 010-.707zM8.475 8.475a.5.5 0 01.707 0l.354.354a.5.5 0 01-.707.707l-.354-.354a.5.5 0 010-.707zM3.525 8.475a.5.5 0 010 .707l-.354.354a.5.5 0 11-.707-.707l.354-.354a.5.5 0 01.707 0zM9.536 2.464a.5.5 0 010 .707l-.354.354a.5.5 0 01-.707-.708l.354-.353a.5.5 0 01.707 0z" />
                    </svg>
                </span>

                <span
                    class="absolute inset-0 flex h-full w-full items-center justify-center transition-opacity"
                    [class.opacity-100]="isDark()"
                    [class.opacity-0]="!isDark()">
                    <svg class="h-3 w-3 text-emerald-600" fill="currentColor" viewBox="0 0 12 12">
                        <path d="M3.75 3.375c0-1.036.84-1.875 1.875-1.875a.375.375 0 01.375.375c0 .125-.062.241-.166.308a3.375 3.375 0 104.47 4.47c.067-.104.183-.166.308-.166a.375.375 0 01.375.375c0 1.036-.84 1.875-1.875 1.875a5.25 5.25 0 11-5.375-5.375z" />
                    </svg>
                </span>
            </span>
        </button>
    </div>

    <div class="h-px bg-gray-50 dark:bg-gray-800 my-1 mx-4"></div>
</div>
