<app-page-wrapper>
    <div page-title class="flex items-center gap-2">
        <div class="p-2 bg-green-50 dark:bg-green-900/20 rounded-lg text-green-600">
            <ng-icon name="heroSquares2x2" size="20"></ng-icon>
        </div>
        <span>Kurs Darajalari</span>
    </div>

    <div actions class="flex items-center gap-2">
        <button (click)="loadGrades()" [class.animate-spin]="isLoading()" class="p-2 text-gray-500 hover:bg-gray-100 rounded-xl">
            <ng-icon name="heroArrowPath" size="18"></ng-icon>
        </button>
    </div>

    <div content class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-7 bg-white dark:bg-gray-900 rounded-2xl border border-gray-100 dark:border-gray-800 shadow-sm overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 dark:bg-gray-800/50">
                <tr>
                    <th class="px-6 py-4 text-left">Nomi (UZ)</th>
                    <th class="px-6 py-4 text-right">Amallar</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
                    @for (grade of grades(); track grade.id) {
                        <tr class="hover:bg-gray-50/50 group">
                            <td class="px-6 py-4 font-medium">{{ grade.name }}</td>
                            <td class="px-6 py-4 text-right space-x-2">
                                <button (click)="onEdit(grade.id)" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg">
                                    <ng-icon name="heroPencil" size="16"></ng-icon>
                                </button>
                                <button (click)="onDelete(grade.id)" class="p-2 text-red-600 hover:bg-red-50 rounded-lg">
                                    <ng-icon name="heroTrash" size="16"></ng-icon>
                                </button>
                            </td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>

        <div class="lg:col-span-5">
            <div class="bg-white dark:bg-gray-900 p-6 rounded-2xl border border-gray-100 dark:border-gray-800 shadow-lg sticky top-6">
                <div class="mb-6 flex justify-between items-center">
                    <h3 class="font-bold flex items-center gap-2">
                        <ng-icon [name]="isEditing() ? 'heroPencil' : 'heroPlusCircle'" class="text-green-600"></ng-icon>
                        {{ isEditing() ? 'Tahrirlash' : 'Yangi qo\'shish' }}
                    </h3>
                    @if (isEditing()) {
                        <button (click)="cancelEdit()" class="text-xs text-red-500 font-bold hover:underline flex items-center gap-1">
                            <ng-icon name="heroXCircle"></ng-icon> BEKOR QILISH
                        </button>
                    }
                </div>

                <app-dynamic-form
                    #gradeForm
                    [fields]="gradeFields"
                    [submitLabel]="isEditing() ? 'SAQLASH' : 'YARATISH'"
                    (formSubmit)="onHandleSubmit($event)">
                </app-dynamic-form>
            </div>
        </div>
    </div>
</app-page-wrapper>
