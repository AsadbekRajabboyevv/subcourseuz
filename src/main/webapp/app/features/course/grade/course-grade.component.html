<app-page-wrapper>
    <div page-title class="flex items-center gap-3">
        <div class="p-2.5 bg-green-50 dark:bg-green-900/20 rounded-xl text-green-600">
            <ng-icon name="heroSquares2x2" size="22"></ng-icon>
        </div>
        <div>
            <span class="text-xl font-extrabold tracking-tight dark:text-white">Kurs Darajalari</span>
            <p class="text-[11px] text-gray-400 font-medium uppercase tracking-wider">Boshqaruv paneli</p>
        </div>
    </div>

    <div actions class="flex items-center gap-2">
        <button (click)="loadGrades()" class="p-2.5 text-gray-500 hover:bg-gray-100 rounded-xl transition-all" [class.animate-spin]="isLoading()">
            <ng-icon name="heroArrowPath" size="18"></ng-icon>
        </button>
    </div>

    <div content class="grid grid-cols-1 lg:grid-cols-12 gap-8">

        <div class="lg:col-span-7 space-y-4">
            @if (isLoading()) {
                <div class="p-12 flex justify-center"><div class="w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div></div>
            } @else {
                <div class="bg-white dark:bg-gray-900 rounded-3xl border border-gray-100 dark:border-gray-800 overflow-hidden shadow-sm">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 uppercase text-[10px] font-bold">
                        <tr>
                            <th class="px-6 py-4">Nomi (UZ)</th>
                            <th class="px-6 py-4">Tavsif</th>
                            <th class="px-6 py-4 text-right">Amallar</th>
                        </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
                            @for (item of grades(); track item.id) {
                                <tr class="hover:bg-gray-50/50 transition-colors group">
                                    <td class="px-6 py-4 font-bold text-gray-900 dark:text-white">{{ item.name }}</td>
                                    <td class="px-6 py-4 text-gray-500 truncate max-w-[200px]">{{ item.description || '—' }}</td>
                                    <td class="px-6 py-4 text-right flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button (click)="onEdit(item)" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-all"><ng-icon name="heroPencil" size="16"></ng-icon></button>
                                        <button (click)="onDelete(item.id)" class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-all"><ng-icon name="heroTrash" size="16"></ng-icon></button>
                                    </td>
                                </tr>
                            }
                        </tbody>
                    </table>
                </div>
            }
        </div>

        <div class="lg:col-span-5">
            <div class="sticky top-6 bg-white dark:bg-gray-900 p-6 rounded-3xl border border-gray-100 dark:border-gray-800 shadow-xl">
                <div class="mb-6 flex justify-between items-center">
                    <h2 class="font-bold text-gray-900 dark:text-white flex items-center gap-2">
                        <ng-icon [name]="isEditing() ? 'heroPencil' : 'heroPlusCircle'" size="18" class="text-green-600"></ng-icon>
                        {{ isEditing() ? 'Tahrirlash' : 'Yangi qo\'shish' }}
                    </h2>
                    @if (isEditing()) {
                        <button (click)="cancelEdit()" class="text-[10px] font-bold text-red-500 uppercase hover:underline">Bekor qilish</button>
                    }
                </div>

                <app-dynamic-form
                    #gradeForm
                    [fields]="gradeFields"
                    [submitLabel]="isEditing() ? 'O\'ZGARISHNI SAQLASH' : 'YARATISH'"
                    (formSubmit)="onHandleSubmit($event)">
                </app-dynamic-form>
            </div>
        </div>

    </div>
</app-page-wrapper>
