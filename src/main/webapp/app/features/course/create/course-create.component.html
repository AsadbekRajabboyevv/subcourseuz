<app-page-wrapper>
    <div page-title>
        <nav
            class="mb-2 flex items-center gap-2 text-[9px] font-black uppercase tracking-[0.2em] text-gray-400">
            <a routerLink="/" class="hover:text-emerald-500">Asosiy</a>
            <i class="fa-solid fa-chevron-right text-[7px]"></i>
            <a routerLink="/courses-list" class="hover:text-emerald-500">Kurslar</a>
            <i class="fa-solid fa-chevron-right text-[7px]"></i>
            <a class="text-emerald-500">Yangi kurs yaratish</a>
            <i class="fa-solid fa-chevron-right text-[7px]"></i>
        </nav>
        <div>
            <h1 class="text-xl font-black uppercase tracking-tight text-gray-900 dark:text-white">
                Yangi kurs yaratish</h1>
            <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">Kurs
                ma'lumotlarini to'ldiring</p>
        </div>
    </div>

    <div content class="mx-auto max-w-4xl">
        <div
            class="rounded-[2.5rem] border border-gray-100 bg-white p-8 shadow-2xl dark:border-gray-800 dark:bg-gray-900">

            <form (ngSubmit)="onSubmit()" #f="ngForm" class="space-y-8">

                <div
                    class="relative h-48 w-full overflow-hidden rounded-[2.5rem] bg-gray-50 dark:bg-gray-800 border-2 border-dashed border-gray-200 dark:border-gray-700 flex flex-col items-center justify-center transition-all hover:border-emerald-500 group">
                    <app-input
                        type="file"
                        (ngModelChange)="onImageSelected($event)"
                        [ngModel]="selectedImage"
                        name="image"
                        class="absolute inset-0 opacity-0 z-10 cursor-pointer">
                    </app-input>

                    <div class="text-center pointer-events-none">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-300 group-hover:text-emerald-500 transition-colors mb-2"></i>
                        <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">
                            Kurs muqovasi (Image)</p>
                        <p *ngIf="selectedImage"
                           class="mt-2 text-xs font-bold text-emerald-500">{{ selectedImage.name }}</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-6">
                        <app-input label="Kurs nomi" placeholder="Masalan: Java Backend"
                                   [(ngModel)]="courseForm.name" name="name" required></app-input>

                        <div class="grid grid-cols-2 gap-4">
                            <app-input type="number" label="Davomiyligi" placeholder="12"
                                       [(ngModel)]="courseForm.duration" name="duration"
                                       required></app-input>
                            <app-input type="select" label="Turi" [options]="durationTypes"
                                       [(ngModel)]="courseForm.durationType" name="durationType"
                                       required></app-input>
                        </div>

                        <app-input type="number" label="Kurs narxi (UZS)" placeholder="500000"
                                   [(ngModel)]="courseForm.price" name="price"></app-input>
                    </div>

                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <app-input
                                type="select"
                                label="Fan"
                                [options]="sciences()"
                                [(ngModel)]="courseForm.scienceId"
                                name="scienceId"
                                required>
                            </app-input>

                            <app-input
                                type="select"
                                label="Daraja / Sinf"
                                [options]="grades()"
                                [(ngModel)]="courseForm.gradeId"
                                name="gradeId"
                                required>
                            </app-input>
                        </div>

                        <app-input type="select" label="Kurs tili" [options]="languages"
                                   [(ngModel)]="courseForm.lang" name="lang"></app-input>

                        <div
                            class="flex items-center gap-4 rounded-[2rem] bg-gray-50 p-6 dark:bg-gray-800/50 border border-gray-100 dark:border-gray-800">
                            <app-input type="checkbox" label="Video kurs"
                                       [(ngModel)]="courseForm.isVideoCourse"
                                       name="isVideoCourse"></app-input>
                            <app-input type="checkbox" label="Nashr qilish"
                                       [(ngModel)]="courseForm.isPublished"
                                       name="isPublished"></app-input>
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <div class="rounded-[2.5rem] overflow-hidden">
                        <app-input
                            type="trix"
                            label="Kurs haqida batafsil ma'lumot"
                            placeholder="Kurs mazmuni, nimalar o'rgatilishi va talablar haqida to'liq ma'lumot qoldiring..."
                            [(ngModel)]="courseForm.description"
                            name="description"
                            class="min-h-[400px]">
                        </app-input>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit"
                            [disabled]="isLoading() || !f.valid"
                            class="w-full rounded-[2rem] bg-gray-900 py-6 text-[12px] font-black uppercase tracking-[0.3em] text-white shadow-2xl transition-all hover:bg-emerald-600 hover:-translate-y-1 active:scale-95 disabled:opacity-50 dark:bg-white dark:text-gray-900 dark:hover:bg-emerald-500 dark:hover:text-white">
                        <span *ngIf="!isLoading()">Kursni saqlash</span>
                        <span *ngIf="isLoading()" class="flex items-center justify-center gap-2">
                            <i class="fa-solid fa-circle-notch animate-spin"></i>
                            Tizimga yozilmoqda...
                        </span>
                    </button>
                </div>

            </form>
        </div>
    </div>
</app-page-wrapper>
