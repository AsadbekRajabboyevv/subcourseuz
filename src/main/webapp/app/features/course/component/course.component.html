<app-page-wrapper>

    <div page-title class="flex items-center gap-2">
        <div class="p-2 bg-green-50 dark:bg-green-900/20 rounded-lg text-green-600">
            <lucide-icon name="book-marked" size="20"></lucide-icon>
        </div>
        <span>Kurslar</span>
    </div>

    <div actions class="flex items-center gap-3">
        <button (click)="loadCourses()"
                class="p-2.5 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-all"
                [class.animate-spin]="isLoading()">
            <lucide-icon name="refresh-cw" size="18"></lucide-icon>
        </button>

        <button routerLink="create"
                class="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-green-600/20 flex items-center gap-2 active:scale-95 transition-all">
            <lucide-icon name="plus-circle" size="18"></lucide-icon>
            YANGI QO'SHISH
        </button>
    </div>

    <div content class="space-y-6">

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 p-5 bg-gray-50/50 dark:bg-gray-800/30 rounded-2xl border border-gray-100 dark:border-gray-800">
            <div class="md:col-span-2 relative">
                <lucide-icon name="search" size="18" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></lucide-icon>
                <input type="text"
                       [(ngModel)]="filter.name"
                       (keyup.enter)="onSearch()"
                       placeholder="Kurs nomi bo'yicha qidirish..."
                       class="w-full pl-11 pr-4 py-3 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-all text-sm">
            </div>

            <select [(ngModel)]="filter.lang"
                    (change)="onSearch()"
                    class="px-4 py-3 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl outline-none text-sm">
                <option value="">Barcha tillar</option>
                <option value="UZB">O'zbek tili</option>
                <option value="RUS">Rus tili</option>
                <option value="ENG">Ingliz tili</option>
            </select>

            <button (click)="onSearch()"
                    class="bg-gray-900 dark:bg-white dark:text-gray-900 text-white font-bold rounded-xl py-3 hover:opacity-90 transition-opacity text-sm uppercase tracking-wider">
                Filtrlash
            </button>
        </div>

        <app-course-card-table
            [courses]="courses()"
            [isLoading]="isLoading()"
            (edit)="onEdit($event)"
            (delete)="onDelete($event)">
        </app-course-card-table>

        <div class="flex items-center justify-between pt-4 border-t border-gray-100 dark:border-gray-800" *ngIf="totalElements() > 0">
            <p class="text-[11px] text-gray-500 font-medium">
                Jami: <span class="text-gray-900 dark:text-white">{{ totalElements() }}</span> ta kurs mavjud
            </p>

            <div class="flex gap-2">
                <button [disabled]="currentPage() === 0"
                        (click)="onPageChange(currentPage() - 1)"
                        class="px-4 py-2 text-[11px] font-bold border border-gray-200 dark:border-gray-700 rounded-lg disabled:opacity-30 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                    Oldingi
                </button>
                <button [disabled]="(currentPage() + 1) * pageSize() >= totalElements()"
                        (click)="onPageChange(currentPage() + 1)"
                        class="px-4 py-2 text-[11px] font-bold bg-gray-100 dark:bg-gray-800 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    Keyingi
                </button>
            </div>
        </div>

    </div>
</app-page-wrapper>
