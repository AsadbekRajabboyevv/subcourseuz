name: CI/CD Pipeline

on:
  push:
    branches: [ dev, stable, prod ]
  pull_request:
    branches: [ dev, stable, prod ]

# Cancel previous runs on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  APP_NAME: 'subcourse'
  JAR_PATH: 'target/*.jar'
  DEPLOY_PATH: '/app/subcourse.jar'

# ─────────────────────────────────────────────
# JOB 1: Test & Build  (dev branch only)
# ─────────────────────────────────────────────
jobs:
  test-and-build:
    name: 🧪 Test & Build
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      jar_name: ${{ steps.jar_info.outputs.jar_name }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📨 Telegram — Build Started
        uses: ./.github/actions/telegram
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          status: running
          branch: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          event: ${{ github.event_name }}
          repo: ${{ github.repository }}

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: 📦 Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: 🧪 Run Tests
        run: mvn -B test --no-transfer-progress

      - name: 🏗️ Build JAR
        run: mvn -B clean package -DskipTests --no-transfer-progress

      - name: 🔍 JAR Info
        id: jar_info
        run: |
          JAR=$(ls target/*.jar | head -1)
          echo "jar_name=$(basename $JAR)" >> $GITHUB_OUTPUT
          echo "JAR built: $JAR"
          echo "Size: $(du -sh $JAR | cut -f1)"

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar-${{ github.sha }}
          path: ${{ env.JAR_PATH }}
          retention-days: 7

      - name: 📨 Telegram — Build Result
        if: always()
        uses: ./.github/actions/telegram
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          status: ${{ job.status }}
          branch: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          event: ${{ github.event_name }}
          repo: ${{ github.repository }}

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Stable
  # ─────────────────────────────────────────────
  deploy-stable:
    name: 🚀 Deploy → Stable
    if: github.ref == 'refs/heads/stable' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: stable
      url: ${{ vars.APP_URL_STABLE }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📨 Telegram — Deploy Started
        uses: ./.github/actions/telegram
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          status: running
          branch: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          event: ${{ github.event_name }}
          repo: ${{ github.repository }}

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: 📦 Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: 🏗️ Build JAR
        run: mvn -B clean package -DskipTests --no-transfer-progress

#      - name: 🔐 Setup SSH
